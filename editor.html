<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BC Fabrication Easy Editor</title><style>body{font-family:Arial,sans-serif;margin:0;background:#f5f5f5;color:#111}.wrap{max-width:1000px;margin:0 auto;padding:24px}.card{background:#fff;border:1px solid #ddd;border-radius:18px;padding:20px;margin-bottom:18px}h1,h2{margin:0 0 12px}label{display:block;font-weight:700;margin:12px 0 6px}input,textarea{width:100%;padding:12px;border:1px solid #ccc;border-radius:12px;font:inherit}textarea{min-height:100px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}button{padding:12px 16px;border:0;border-radius:12px;background:#111;color:#fff;font-weight:700;cursor:pointer}.muted{color:#666}</style></head><body><div class="wrap"><div class="card"><h1>Easy editor</h1><p class="muted">This page does not save to Netlify automatically. It lets you edit the main content and download new JSON files. Replace the files inside <strong>content/</strong> on your site, then re-upload to Netlify.</p><button id="downloadSite">Download updated site.json</button><button id="downloadGallery" style="margin-left:8px;">Download updated gallery.json</button></div><div class="card"><h2>Brand</h2><div class="grid"><div><label>Business name</label><input id="brand_name"></div><div><label>Top tagline</label><input id="brand_tagline"></div><div><label>Phone display</label><input id="phone_display"></div><div><label>Phone link</label><input id="phone_link"></div><div><label>Email</label><input id="email"></div><div><label>Location</label><input id="location"></div></div></div><div class="card"><h2>Hero</h2><label>Eyebrow</label><input id="hero_eyebrow"><label>Title</label><input id="hero_title"><label>Text</label><textarea id="hero_text"></textarea><label>Hero image path</label><input id="hero_image"></div><div class="card"><h2>Services intro</h2><label>Title</label><input id="services_title"><label>Text</label><textarea id="services_text"></textarea></div><div class="card"><h2>Gallery intro</h2><label>Title</label><input id="gallery_title"><label>Text</label><textarea id="gallery_text"></textarea></div><div class="card"><h2>Enquiry section</h2><label>Title</label><input id="enquiry_title"><label>Text</label><textarea id="enquiry_text"></textarea><label>Button text</label><input id="enquiry_button"></div><div class="card"><h2>Gallery items</h2><div id="galleryItems"></div></div></div><script>let siteData=null,galleryData=null;function download(filename,text){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'application/json'}));a.download=filename;a.click();}function fill(){brand_name.value=siteData.brand.name;brand_tagline.value=siteData.brand.tagline;phone_display.value=siteData.brand.phone_display;phone_link.value=siteData.brand.phone_link;email.value=siteData.brand.email;location.value=siteData.brand.location;hero_eyebrow.value=siteData.hero.eyebrow;hero_title.value=siteData.hero.title;hero_text.value=siteData.hero.text;hero_image.value=siteData.hero.hero_image;services_title.value=siteData.services_intro.title;services_text.value=siteData.services_intro.text;gallery_title.value=siteData.gallery_intro.title;gallery_text.value=siteData.gallery_intro.text;enquiry_title.value=siteData.enquiry.title;enquiry_text.value=siteData.enquiry.text;enquiry_button.value=siteData.enquiry.button;galleryItems.innerHTML=galleryData.map((item,i)=>`<div class="row"><input data-i="${i}" data-k="title" value="${item.title}"><input data-i="${i}" data-k="src" value="${item.src}"><input data-i="${i}" data-k="description" value="${item.description}" style="grid-column:1/-1"></div>`).join('');}function collect(){siteData.brand.name=brand_name.value;siteData.brand.tagline=brand_tagline.value;siteData.brand.phone_display=phone_display.value;siteData.brand.phone_link=phone_link.value;siteData.brand.email=email.value;siteData.brand.location=location.value;siteData.hero.eyebrow=hero_eyebrow.value;siteData.hero.title=hero_title.value;siteData.hero.text=hero_text.value;siteData.hero.hero_image=hero_image.value;siteData.services_intro.title=services_title.value;siteData.services_intro.text=services_text.value;siteData.gallery_intro.title=gallery_title.value;siteData.gallery_intro.text=gallery_text.value;siteData.enquiry.title=enquiry_title.value;siteData.enquiry.text=enquiry_text.value;siteData.enquiry.button=enquiry_button.value;document.querySelectorAll('#galleryItems input').forEach(input=>{galleryData[Number(input.dataset.i)][input.dataset.k]=input.value;});}Promise.all([fetch('content/site.json').then(r=>r.json()),fetch('content/gallery.json').then(r=>r.json())]).then(([site,gallery])=>{siteData=site;galleryData=gallery;fill();});downloadSite.onclick=()=>{collect();download('site.json',JSON.stringify(siteData,null,2));};downloadGallery.onclick=()=>{collect();download('gallery.json',JSON.stringify(galleryData,null,2));};</script></body></html>
