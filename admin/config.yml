backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "content"
    label: "Content"
    files:
      - file: "content/site.json"
        label: "Site"
        name: "site"
        fields:
          - {label: "Title", name: "title", widget: "string"}
